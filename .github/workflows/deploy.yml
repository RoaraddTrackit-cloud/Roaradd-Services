name: Build and Deploy to Replit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build:github
        env:
          BASE_PATH: /

      - name: Trigger Replit Redeploy
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.REPLIT_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://replit.com/api/v1/deployments/${{ secrets.REPLIT_DEPLOYMENT_ID }}/redeploy
        continue-on-error: true
