<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RoarAdd</title>
  <script>
    // GitHub Pages SPA 404 redirect — stores current path and redirects to /
    sessionStorage.redirect = location.href;
    window.location.replace(
      location.protocol + '//' + location.hostname +
      (location.port ? ':' + location.port : '') + '/'
    );
  </script>
</head>
<body></body>
</html>
